name: Update ZET GTFS

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gtfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GTFS
        run: |
          curl -L "https://www.zet.hr/gtfs-scheduled/latest" -o gtfs.zip

      - name: Commit GTFS
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gtfs.zip
          git commit -m "Update ZET GTFS" || echo "No changes"
          git push
